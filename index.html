<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreta Digital Inteligente - Marcos Fuentes</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121214;
            --bg-surface: #1a1a1e;
            --bg-card: #26262b;
            --text-main: #ffffff;
            --text-muted: #a0a0aa;
            --accent: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 15px; padding: 15px; background: var(--bg-surface); border-radius: 16px; border: 1px solid #333; }
        header h1 { font-size: 22px; font-weight: 700; color: var(--text-main); }
        header p { font-size: 13px; color: var(--text-muted); }

        .backup-section { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .btn-backup { padding: 10px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; flex: 1; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .btn-backup.export { background: rgba(16, 185, 129, 0.15); border: 1px solid var(--success); color: var(--success); }
        .btn-backup.import { background: rgba(37, 99, 235, 0.15); border: 1px solid var(--accent); color: var(--accent); }

        /* Contenedor de Alertas */
        .alert-box { background: rgba(245, 158, 11, 0.15); border: 1px solid var(--warning); border-radius: 14px; padding: 15px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .alert-title { font-size: 14px; font-weight: 600; color: var(--warning); }
        .alert-text { font-size: 18px; font-weight: 700; color: #fff; }
        .alert-btn { background: var(--warning); color: #000; border: none; padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; align-self: flex-start; }

        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
        
        .card { background: var(--bg-surface); border-radius: 16px; padding: 20px; border: 1px solid #2d2d34; margin-bottom: 25px; }
        
        /* Cierre Display con Desglose */
        .cierre-display { background: var(--bg-card); border-radius: 12px; margin-bottom: 15px; border: 1px solid #3a3a44; overflow: hidden; }
        .cierre-row { display: flex; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #3a3a44; font-size: 14px; }
        .cierre-row.total-general { background: rgba(255,255,255,0.03); border-bottom: none; font-weight: 700; font-size: 16px; padding: 12px 15px; }
        .val-efectivo { color: #fff; font-weight: 600; }
        .val-nequi { color: #818cf8; font-weight: 600; }
        .val-total { color: var(--success); }

        /* Botonera Rápida */
        .input-box { margin-bottom: 15px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-quick { border: none; padding: 12px; font-size: 13px; font-weight: 600; border-radius: 10px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-quick.in-efec { background: #15803d; } /* Verde oscuro */
        .btn-quick.in-neq { background: #4338ca; }  /* Morado/Azul Nequi */
        .btn-quick.out-efec { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: var(--danger); }
        .btn-quick.out-neq { background: rgba(168, 85, 247, 0.2); border: 1px solid #a855f7; color: #c084fc; }

        .fiados-list, .proveedores-list { display: flex; flex-direction: column; gap: 12px; }
        .item-row { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid #3a3a44; display: flex; justify-content: space-between; align-items: center; }
        
        .info-col { display: flex; flex-direction: column; gap: 2px; }
        .name-row { display: flex; align-items: center; gap: 8px; }
        .item-name { font-weight: 600; font-size: 15px; }
        .edit-badge { font-size: 10px; background: #444; color: #ccc; padding: 2px 6px; border-radius: 20px; cursor: pointer; }
        
        .item-monto { font-size: 18px; font-weight: 700; }
        .monto-deuda { color: var(--danger); }
        
        .actions-row { display: flex; gap: 6px; align-items: center; }
        .btn-action { border: none; padding: 8px 10px; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; }
        .btn-pay { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .btn-add-more { background: rgba(37, 99, 235, 0.15); color: var(--accent); }
        .btn-del { background: rgba(239, 68, 116, 0.15); color: var(--danger); font-size: 14px; }
        .btn-alert-prov { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Libreta Digital de Ventas</h1>
        <p>Marcos Fuentes • Gestión de Negocio</p>
    </header>

    <div class="backup-section">
        <button class="btn-backup export" onclick="exportarDatos()">💾 Descargar Copia</button>
        <button class="btn-backup import" onclick="importarDatos()">📂 Restaurar Copia</button>
    </div>

    <div id="contenedor-recordatorios"></div>

    <!-- SECCIÓN 1: CIERRE DE CAJA MEJORADO -->
    <div class="section-title">📊 Caja y Métodos de Pago</div>
    <div class="card">
        <div class="cierre-display">
            <div class="cierre-row">
                <span>💵 En Efectivo:</span>
                <span class="val-efectivo" id="caja-efectivo">$0</span>
            </div>
            <div class="cierre-row">
                <span>📱 En Nequi:</span>
                <span class="val-nequi" id="caja-nequi">$0</span>
            </div>
            <div class="cierre-row total-general">
                <span>📈 Total del Día:</span>
                <span class="val-total" id="caja-total">$0</span>
            </div>
        </div>
        
        <div class="input-box">
            <input type="number" id="cierre-monto-input" placeholder="Monto del movimiento ($)">
            
            <div class="btn-grid">
                <button class="btn-quick in-efec" onclick="registrarMovimiento('ingreso', 'efectivo')">➕ Venta Efectivo</button>
                <button class="btn-quick in-neq" onclick="registrarMovimiento('ingreso', 'nequi')">➕ Venta Nequi</button>
                <button class="btn-quick out-efec" onclick="registrarMovimiento('egreso', 'efectivo')">➖ Gasto Efectivo</button>
                <button class="btn-quick out-neq" onclick="registrarMovimiento('egreso', 'nequi')">➖ Gasto Nequi</button>
            </div>
        </div>
    </div>

    <!-- SECCIÓN 2: CONTROL DE FIADOS -->
    <div class="section-title">
        <span>👥 Personas que Deben</span>
        <button onclick="nuevoCliente()" style="background:none; border:none; color:var(--accent); font-weight:600; cursor:pointer; font-size:14px;">+ Nuevo Cliente</button>
    </div>
    <div class="card">
        <div class="fiados-list" id="lista-fiados"></div>
    </div>

    <!-- SECCIÓN 3: ESTADO DE PROVEEDORES -->
    <div class="section-title">
        <span>🚚 Estado de Proveedores</span>
        <button onclick="nuevoProveedor()" style="background:none; border:none; color:var(--warning); font-weight:600; cursor:pointer; font-size:14px;">+ Nuevo Proveedor</button>
    </div>
    <div class="card">
        <div class="proveedores-list" id="lista-proveedores"></div>
    </div>
</div>

<script>
    // Corrección estructural para mantener saldos independientes
    let datosApp = {
        cierreEfectivo: 0,
        cierreNequi: 0,
        clientes: [],
        proveedores: [],
        recordatorios: []
    };

    // Migración automática de versiones viejas si existieran
    if (localStorage.getItem('libreta_inteligente_v4')) {
        const viejo = JSON.parse(localStorage.getItem('libreta_inteligente_v4'));
        datosApp.clientes = viejo.clientes || [];
        datosApp.proveedores = viejo.proveedores || [];
        datosApp.recordatorios = viejo.recordatorios || [];
        datosApp.cierreEfectivo = viejo.cierreDiario || 0; // Migrar total viejo a efectivo por defecto
        localStorage.removeItem('libreta_inteligente_v4');
        guardar();
    } else if (localStorage.getItem('libreta_inteligente_v5')) {
        datosApp = JSON.parse(localStorage.getItem('libreta_inteligente_v5'));
    }

    function guardar() {
        localStorage.setItem('libreta_inteligente_v5', JSON.stringify(datosApp));
    }

    // --- RESPALDOS ---
    function exportarDatos() {
        const dataStr = JSON.stringify(datosApp);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const fecha = new Date().toLocaleDateString().replace(/\//g, '-');
        a.href = url;
        a.download = `Copia_Libreta_${fecha}.json`;
        a.click();
        URL.revokeObjectURL(url);
        Swal.fire({ icon: 'success', title: 'Copia Descargada', background: '#1a1a1e', color: '#fff' });
    }

    function importarDatos() {
        Swal.fire({
            title: '¿Restaurar copia?',
            text: "Se reemplazarán los datos de la pantalla.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Sí, restaurar',
            background: '#1a1a1e', color: '#fff'
        }).then((result) => {
            if (result.isConfirmed) {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            datosApp = JSON.parse(event.target.result);
                            guardar();
                            actualizarPantalla();
                            renderRecordatorios();
                            Swal.fire({ icon: 'success', title: 'Restaurado', background: '#1a1a1e', color: '#fff' });
                        } catch (error) {
                            Swal.fire({ icon: 'error', title: 'Error en archivo', background: '#1a1a1e', color: '#fff' });
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }
        });
    }

    // --- NUEVA BOTONERA RAPIDA DE MOVIMIENTOS ---
    function registrarMovimiento(tipo, metodo) {
        const montoInput = document.getElementById('cierre-monto-input');
        const monto = parseFloat(montoInput.value);

        if (!monto || monto <= 0) {
            Swal.fire({ icon: 'error', title: 'Monto inválido', background: '#1a1a1e', color: '#fff' });
            return;
        }

        const factor = (tipo === 'ingreso' ? 1 : -1);

        if (metodo === 'efectivo') {
            datosApp.cierreEfectivo += (monto * factor);
        } else {
            datosApp.cierreNequi += (monto * factor);
        }

        montoInput.value = '';
        guardar();
        actualizarPantalla();
    }

    // --- RECORDATORIOS PROVEEDORES ---
    function renderRecordatorios() {
        const contenedor = document.getElementById('contenedor-recordatorios');
        contenedor.innerHTML = '';
        datosApp.recordatorios.forEach((rec, index) => {
            contenedor.innerHTML += `
                <div class="alert-box">
                    <div class="alert-title">🔔 RECORDATORIO ENLAZADO: ${rec.proveedor.toUpperCase()}</div>
                    <div class="alert-text">
                        Pasa el <span style="color:var(--warning);">${rec.dia}</span>. 
                        <span style="display:block; font-size:22px; color:#fff; margin-top:5px;">Valor: $${rec.valor.toLocaleString()}</span>
                    </div>
                    <button class="alert-btn" onclick="eliminarRecordatorio(${index})">✔ Confirmar y Quitar Aviso</button>
                </div>
            `;
        });
    }

    function crearRecordatorioId(provIndex) {
        const prov = datosApp.proveedores[provIndex];
        Swal.fire({
            title: `Recordatorio: ${prov.nombre}`,
            background: '#1a1a1e', color: '#fff',
            html: `
                <input id="rec-dia" class="swal2-input" placeholder="Ej: Martes" style="margin-bottom:10px; background:#26262b; color:#fff;">
                <input id="rec-valor" type="number" class="swal2-input" placeholder="Monto ($)" style="background:#26262b; color:#fff;">
            `,
            showCancelButton: true,
            confirmButtonText: 'Crear Alerta',
            preConfirm: () => {
                return { dia: document.getElementById('rec-dia').value, valor: parseFloat(document.getElementById('rec-valor').value) };
            }
        }).then((result) => {
            if (result.isConfirmed && result.value.dia && result.value.valor) {
                datosApp.recordatorios.push({ proveedor: prov.nombre, dia: result.value.dia, valor: result.value.valor });
                guardar(); renderRecordatorios();
            }
        });
    }

    function eliminarRecordatorio(index) {
        datosApp.recordatorios.splice(index, 1);
        guardar(); renderRecordatorios();
    }

    // --- FIADOS ---
    function nuevoCliente() {
        Swal.fire({ title: 'Nuevo Cliente', input: 'text', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((res) => {
            if (res.isConfirmed && res.value) {
                datosApp.clientes.push({ nombre: res.value, saldo: 0, cambiosNombre: 0 });
                guardar(); actualizarPantalla();
            }
        });
    }

    function editarNombre(index) {
        let c = datosApp.clientes[index];
        if (c.cambiosNombre >= 2) return;
        Swal.fire({ title: 'Editar Nombre', input: 'text', inputValue: c.nombre, showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((res) => {
            if (res.isConfirmed && res.value) {
                c.nombre = res.value; c.cambiosNombre += 1;
                guardar(); actualizarPantalla();
            }
        });
    }

    function modificarSaldo(index, accion) {
        const c = datosApp.clientes[index];
        Swal.fire({ title: accion === 'fiar' ? `Fiar a ${c.nombre}` : `Abonar de ${c.nombre}`, input: 'number', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((res) => {
            if (res.isConfirmed && parseFloat(res.value) > 0) {
                c.saldo += (accion === 'fiar' ? parseFloat(res.value) : -parseFloat(res.value));
                if (c.saldo < 0) c.saldo = 0;
                guardar(); actualizarPantalla();
            }
        });
    }

    function eliminarCliente(index) {
        Swal.fire({ title: '¿Eliminar cuenta?', text: 'Se borrará permanentemente.', icon: 'warning', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((result) => {
            if (result.isConfirmed) {
                datosApp.clientes.splice(index, 1);
                guardar(); actualizarPantalla();
            }
        });
    }

    // --- PROVEEDORES ---
    function nuevoProveedor() {
        Swal.fire({ title: 'Nuevo Proveedor', input: 'text', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((res) => {
            if (res.isConfirmed && res.value) {
                datosApp.proveedores.push({ nombre: res.value, saldoPendiente: 0 });
                guardar(); actualizarPantalla();
            }
        });
    }

    function modificarSaldoProveedor(index) {
        const p = datosApp.proveedores[index];
        Swal.fire({ title: `Factura de ${p.nombre}`, input: 'number', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((res) => {
            if (res.isConfirmed) {
                p.saldoPendiente = parseFloat(res.value) || 0;
                guardar(); actualizarPantalla();
            }
        });
    }

    function eliminarProveedor(index) {
        Swal.fire({ title: '¿Eliminar proveedor?', icon: 'warning', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((result) => {
            if (result.isConfirmed) {
                datosApp.proveedores.splice(index, 1);
                guardar(); actualizarPantalla();
            }
        });
    }

    // --- RENDERIZADO GENERAL ---
    function actualizarPantalla() {
        // Render de montos independientes de caja
        const totalGen = datosApp.cierreEfectivo + datosApp.cierreNequi;
        document.getElementById('caja-efectivo').innerText = `$${datosApp.cierreEfectivo.toLocaleString()}`;
        document.getElementById('caja-nequi').innerText = `$${datosApp.cierreNequi.toLocaleString()}`;
        document.getElementById('caja-total').innerText = `$${totalGen.toLocaleString()}`;
        
        // Clientes
        const listaC = document.getElementById('lista-fiados');
        listaC.innerHTML = datosApp.clientes.length === 0 ? `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:5px;">Sin clientes.</div>` : '';
        datosApp.clientes.forEach((c, index) => {
            listaC.innerHTML += `
                <div class="item-row">
                    <div class="info-col">
                        <div class="name-row">
                            <span class="item-name">${c.nombre}</span>
                            ${c.cambiosNombre < 2 ? `<span class="edit-badge" onclick="editarNombre(${index})">📝</span>` : ''}
                        </div>
                    </div>
                    <div class="actions-row">
                        <div class="item-monto monto-deuda" style="margin-right:8px;">$${c.saldo.toLocaleString()}</div>
                        <button class="btn-action btn-add-more" onclick="modificarSaldo(${index}, 'fiar')">+ Fiar</button>
                        <button class="btn-action btn-pay" onclick="modificarSaldo(${index}, 'pagar')">✔</button>
                        <button class="btn-action btn-del" onclick="eliminarCliente(${index})">🗑️</button>
                    </div>
                </div>
            `;
        });

        // Proveedores
        const listaP = document.getElementById('lista-proveedores');
        listaP.innerHTML = datosApp.proveedores.length === 0 ? `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:5px;">Sin proveedores.</div>` : '';
        datosApp.proveedores.forEach((p, index) => {
            listaP.innerHTML += `
                <div class="item-row">
                    <div class="info-col">
                        <span class="item-name" onclick="modificarSaldoProveedor(${index})" style="cursor:pointer; text-decoration:underline;">${p.nombre} 📝</span>
                        <span style="font-size:12px; color:var(--text-muted);">Deuda: $${p.saldoPendiente.toLocaleString()}</span>
                    </div>
                    <div class="actions-row">
                        <button class="btn-action btn-alert-prov" onclick="crearRecordatorioId(${index})">🔔 Alerta</button>
                        <button class="btn-action btn-del" onclick="eliminarProveedor(${index})">🗑️</button>
                    </div>
                </div>
            `;
        });
    }

    if(!datosApp.recordatorios) datosApp.recordatorios = [];
    renderRecordatorios();
    actualizarPantalla();
</script>
</body>
</html>
