<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Libreta Digital Inteligente</title>
    <style>
        :root { --bg-primary: #121214; --bg-card: #1a1a1e; --text: #ffffff; --accent: #2563eb; --danger: #ef4444; }
        body { background: var(--bg-primary); color: var(--text); font-family: sans-serif; padding: 20px; }
        .section-card { background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
        .btn-more { width: 100%; padding: 10px; background: #26262b; border: 1px solid #333; color: #fff; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        /* Estilos del Modal */
        #modal-global { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 450px; padding: 20px; border-radius: 16px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

    <!-- Sección Ejemplo: Deudores -->
    <div class="section-card" id="seccion-deudores">
        <h3>Personas que deben</h3>
        <div id="lista-deudores"></div>
    </div>

    <!-- Modal Global -->
    <div id="modal-global">
        <div class="modal-content">
            <h2 id="modal-titulo" style="text-align:center;">Detalle</h2>
            <div id="modal-contenido"></div>
            <button onclick="cerrarModal()" class="btn-more" style="background:var(--accent);">OK</button>
        </div>
    </div>

    <script>
        // Datos de ejemplo
        let deudores = [
            { nombre: "qqq", valor: 1111 }, { nombre: "wwww", valor: 1111 },
            { nombre: "eeee", valor: 1111 }, { nombre: "esdw", valor: 1111 },
            { nombre: "qqqq", valor: 1111 }, { nombre: "extra", valor: 5000 }
        ];

        // Formato moneda corregido
        function formatear(num) {
            return '$' + num.toLocaleString('es-CO');
        }

        function renderizarDeudores() {
            const contenedor = document.getElementById('lista-deudores');
            contenedor.innerHTML = '';
            
            // Mostrar solo primeros 4
            deudores.slice(0, 4).forEach(d => {
                contenedor.innerHTML += `
                    <div class="item-row">
                        <span>${d.nombre}</span>
                        <span style="color:var(--danger)">${formatear(d.valor)}</span>
                    </div>
                `;
            });

            if (deudores.length > 4) {
                contenedor.innerHTML += `<button class="btn-more" onclick="abrirModal()">👁️ Ver todos (${deudores.length})</button>`;
            }
        }

        function abrirModal() {
            document.getElementById('modal-global').style.display = 'flex';
            const cont = document.getElementById('modal-contenido');
            cont.innerHTML = '';
            deudores.forEach(d => {
                cont.innerHTML += `
                    <div class="item-row">
                        <span>${d.nombre}</span>
                        <span style="color:var(--danger)">${formatear(d.valor)}</span>
                    </div>
                `;
            });
        }

        function cerrarModal() {
            document.getElementById('modal-global').style.display = 'none';
        }

        // Inicializar
        renderizarDeudores();
    </script>
</body>
</html>
