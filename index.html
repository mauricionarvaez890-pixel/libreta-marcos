<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreta Digital Inteligente - Marcos Fuentes</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121214;
            --bg-surface: #1a1a1e;
            --bg-card: #26262b;
            --text-main: #ffffff;
            --text-muted: #a0a0aa;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 25px; padding: 15px; background: var(--bg-surface); border-radius: 16px; border: 1px solid #333; }
        header h1 { font-size: 22px; font-weight: 700; color: var(--text-main); }
        header p { font-size: 13px; color: var(--text-muted); }

        /* Contenedor de Alertas Exclusivas */
        .alert-box { background: rgba(245, 158, 11, 0.15); border: 1px solid var(--warning); border-radius: 14px; padding: 15px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .alert-title { font-size: 14px; font-weight: 600; color: var(--warning); display: flex; align-items: center; gap: 8px; }
        .alert-text { font-size: 18px; font-weight: 700; color: #fff; }
        .alert-btn { background: var(--warning); color: #000; border: none; padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; align-self: flex-start; }

        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
        
        .card { background: var(--bg-surface); border-radius: 16px; padding: 20px; border: 1px solid #2d2d34; margin-bottom: 25px; }
        
        .cierre-display { text-align: center; padding: 15px; background: var(--bg-card); border-radius: 12px; margin-bottom: 15px; border: 1px solid #3a3a44; }
        .cierre-monto { font-size: 32px; font-weight: 700; color: var(--success); margin-top: 5px; }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input, select { background: var(--bg-card); border: 1px solid #3a3a44; padding: 12px; border-radius: 10px; color: #fff; font-size: 14px; width: 100%; outline: none; }
        
        button.btn-main { background: var(--accent); color: #fff; border: none; padding: 14px; width: 100%; font-size: 15px; font-weight: 600; border-radius: 10px; cursor: pointer; }

        .fiados-list, .proveedores-list { display: flex; flex-direction: column; gap: 12px; }
        .item-row { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid #3a3a44; display: flex; justify-content: space-between; align-items: center; }
        
        .info-col { display: flex; flex-direction: column; gap: 2px; }
        .name-row { display: flex; align-items: center; gap: 8px; }
        .item-name { font-weight: 600; font-size: 15px; }
        .edit-badge { font-size: 10px; background: #444; color: #ccc; padding: 2px 6px; border-radius: 20px; cursor: pointer; }
        
        .item-monto { font-size: 18px; font-weight: 700; }
        .monto-deuda { color: var(--danger); }
        .monto-prov { color: var(--warning); }
        
        .actions-row { display: flex; gap: 6px; align-items: center; }
        .btn-action { border: none; padding: 8px 10px; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; }
        .btn-pay { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .btn-add-more { background: rgba(37, 99, 235, 0.15); color: var(--accent); }
        .btn-del { background: rgba(239, 68, 116, 0.15); color: var(--danger); font-size: 14px; }
        .btn-alert-prov { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Libreta Digital de Ventas</h1>
        <p>Marcos Fuentes • Gestión de Negocio</p>
    </header>

    <!-- ZONA DE RECORDATORIOS ENLAZADOS (Solo aparecen si se crean desde proveedores) -->
    <div id="contenedor-recordatorios"></div>

    <!-- SECCIÓN 1: CIERRE DE CAJA -->
    <div class="section-title">📊 Cierre de Caja Diario</div>
    <div class="card">
        <div class="cierre-display">
            <div>Total Acumulado Hoy</div>
            <div class="cierre-monto" id="cierre-total">$0</div>
        </div>
        <div class="grid-inputs">
            <input type="number" id="cierre-monto-input" placeholder="Monto ($)">
            <select id="cierre-tipo">
                <option value="ingreso">➕ Ingreso (Venta)</option>
                <option value="egreso">➖ Egreso (Gasto/Pago)</option>
            </select>
        </div>
        <button class="btn-main" onclick="registrarCaja()">Registrar en Caja</button>
    </div>

    <!-- SECCIÓN 2: CONTROL DE FIADOS -->
    <div class="section-title">
        <span>👥 Personas que Deben (Fiados)</span>
        <button onclick="nuevoCliente()" style="background:none; border:none; color:var(--accent); font-weight:600; cursor:pointer; font-size:14px;">+ Nuevo Cliente</button>
    </div>
    <div class="card">
        <div class="fiados-list" id="lista-fiados">
            <!-- Dinámico -->
        </div>
    </div>

    <!-- SECCIÓN 3: ESTADO DE PROVEEDORES -->
    <div class="section-title">
        <span>🚚 Estado de Proveedores</span>
        <button onclick="nuevoProveedor()" style="background:none; border:none; color:var(--warning); font-weight:600; cursor:pointer; font-size:14px;">+ Nuevo Proveedor</button>
    </div>
    <div class="card">
        <div class="proveedores-list" id="lista-proveedores">
            <!-- Dinámico -->
        </div>
    </div>
</div>

<script>
    // Estructura de datos limpia desde cero
    let datosApp = {
        cierreDiario: 0,
        clientes: [],
        proveedores: [],
        recordatorios: [] // Vinculados únicamente a proveedores
    };

    // Cargar datos guardados
    if (localStorage.getItem('libreta_inteligente_v4')) {
        datosApp = JSON.parse(localStorage.getItem('libreta_inteligente_v4'));
    }

    function guardar() {
        localStorage.setItem('libreta_inteligente_v4', JSON.stringify(datosApp));
    }

    // --- LÓGICA DE RECORDATORIOS DE PROVEEDORES ---
    function renderRecordatorios() {
        const contenedor = document.getElementById('contenedor-recordatorios');
        contenedor.innerHTML = '';
        
        datosApp.recordatorios.forEach((rec, index) => {
            contenedor.innerHTML += `
                <div class="alert-box">
                    <div class="alert-title">🔔 RECORDATORIO ENLAZADO: ${rec.proveedor.toUpperCase()}</div>
                    <div class="alert-text">
                        Pasa el <span style="color:var(--warning);">${rec.dia}</span>. 
                        <span style="display:block; font-size:24px; color:#fff; margin-top:5px;">Valor: $${rec.valor.toLocaleString()}</span>
                    </div>
                    <button class="alert-btn" onclick="eliminarRecordatorio(${index})">✔ Confirmar y Quitar Aviso</button>
                </div>
            `;
        });
    }

    function crearRecordatorioId(provIndex) {
        const prov = datosApp.proveedores[provIndex];
        
        Swal.fire({
            title: `Recordatorio para ${prov.nombre}`,
            background: '#1a1a1e',
            color: '#fff',
            html: `
                <input id="rec-dia" class="swal2-input" placeholder="Ej: Martes 14, Mañana..." style="margin-bottom:10px; background:#26262b; color:#fff;">
                <input id="rec-valor" type="number" class="swal2-input" placeholder="Monto a pagar ($)" style="background:#26262b; color:#fff;">
            `,
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: 'Crear Alerta',
            preConfirm: () => {
                const dia = document.getElementById('rec-dia').value;
                const valor = document.getElementById('rec-valor').value;
                if (!dia || !valor) {
                    Swal.showValidationMessage('Por favor llena ambos campos');
                }
                return { dia, valor: parseFloat(valor) };
            }
        }).then((result) => {
            if (result.isConfirmed) {
                datosApp.recordatorios.push({
                    proveedor: prov.nombre,
                    dia: result.value.dia,
                    valor: result.value.valor
                });
                guardar();
                renderRecordatorios();
                Swal.fire({ icon: 'success', title: 'Alerta Creada', text: 'El recordatorio ya aparece arriba.', timer: 1500, showConfirmButton: false, background: '#1a1a1e', color: '#fff' });
            }
        });
    }

    function eliminarRecordatorio(index) {
        datosApp.recordatorios.splice(index, 1);
        guardar();
        renderRecordatorios();
        Swal.fire({ icon: 'success', title: 'Completado', text: 'Aviso retirado del sistema.', timer: 1200, showConfirmButton: false, background: '#1a1a1e', color: '#fff' });
    }

    // --- LÓGICA DE CIERRE DE CAJA ---
    function registrarCaja() {
        const montoInput = document.getElementById('cierre-monto-input');
        const tipo = document.getElementById('cierre-tipo').value;
        const monto = parseFloat(montoInput.value);

        if (!monto || monto <= 0) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Ingresa un monto válido.', background: '#1a1a1e', color: '#fff' });
            return;
        }

        datosApp.cierreDiario += (tipo === 'ingreso' ? monto : -monto);
        montoInput.value = '';
        guardar();
        actualizarPantalla();
    }

    // --- LÓGICA DE FIADOS (PERSONAS) ---
    function nuevoCliente() {
        Swal.fire({
            title: 'Nuevo Cliente Fiado',
            input: 'text',
            inputPlaceholder: 'Nombre de la persona...',
            showCancelButton: true,
            background: '#1a1a1e', color: '#fff',
            preConfirm: (v) => { if (!v) Swal.showValidationMessage('El nombre es obligatorio'); return v; }
        }).then((res) => {
            if (res.isConfirmed) {
                datosApp.clientes.push({ nombre: res.value, saldo: 0, cambiosNombre: 0 });
                guardar(); actualizarPantalla();
            }
        });
    }

    function editarNombre(index) {
        let c = datosApp.clientes[index];
        if (c.cambiosNombre >= 2) return;

        Swal.fire({
            title: 'Cambiar Nombre',
            text: `Te quedan ${2 - c.cambiosNombre} cambios de nombre libres.`,
            input: 'text',
            inputValue: c.nombre,
            showCancelButton: true,
            background: '#1a1a1e', color: '#fff',
            preConfirm: (v) => { if (!v) Swal.showValidationMessage('No puede estar vacío'); return v; }
        }).then((res) => {
            if (res.isConfirmed) {
                c.nombre = res.value;
                c.cambiosNombre += 1;
                guardar(); actualizarPantalla();
            }
        });
    }

    function modificarSaldo(index, accion) {
        const c = datosApp.clientes[index];
        Swal.fire({
            title: accion === 'fiar' ? `Fiar a ${c.nombre}` : `Abonar de ${c.nombre}`,
            input: 'number',
            inputPlaceholder: 'Monto ($)',
            showCancelButton: true,
            background: '#1a1a1e', color: '#fff',
            preConfirm: (v) => { if (!v || parseFloat(v) <= 0) Swal.showValidationMessage('Monto incorrecto'); return parseFloat(v); }
        }).then((res) => {
            if (res.isConfirmed) {
                c.saldo += (accion === 'fiar' ? res.value : -res.value);
                if (c.saldo < 0) c.saldo = 0;
                guardar(); actualizarPantalla();
            }
        });
    }

    function eliminarCliente(index) {
        Swal.fire({
            title: '¿Eliminar cuenta?',
            text: `Vas a borrar definitivamente a "${datosApp.clientes[index].nombre}" de la libreta.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Sí, borrar',
            cancelButtonText: 'Cancelar',
            background: '#1a1a1e', color: '#fff'
        }).then((result) => {
            if (result.isConfirmed) {
                datosApp.clientes.splice(index, 1);
                guardar();
                actualizarPantalla();
                Swal.fire({ icon: 'success', title: 'Eliminado', text: 'El cliente ha sido borrado.', timer: 1200, showConfirmButton: false, background: '#1a1a1e', color: '#fff' });
            }
        });
    }

    // --- LÓGICA DE PROVEEDORES ---
    function nuevoProveedor() {
        Swal.fire({
            title: 'Registrar Proveedor',
            input: 'text',
            inputPlaceholder: 'Nombre de la empresa o distribuidor...',
            showCancelButton: true,
            background: '#1a1a1e', color: '#fff',
            preConfirm: (v) => { if (!v) Swal.showValidationMessage('El nombre es requerido'); return v; }
        }).then((res) => {
            if (res.isConfirmed) {
                datosApp.proveedores.push({ nombre: res.value, saldoPendiente: 0 });
                guardar(); actualizarPantalla();
            }
        });
    }

    function modificarSaldoProveedor(index) {
        const p = datosApp.proveedores[index];
        Swal.fire({
            title: `Factura de ${p.nombre}`,
            input: 'number',
            inputPlaceholder: 'Monto de deuda pendiente ($)',
            showCancelButton: true,
            background: '#1a1a1e', color: '#fff',
            preConfirm: (v) => { if (!v) Swal.showValidationMessage('Monto requerido'); return parseFloat(v); }
        }).then((res) => {
            if (res.isConfirmed) {
                p.saldoPendiente = res.value;
                guardar(); actualizarPantalla();
            }
        });
    }

    function eliminarProveedor(index) {
        Swal.fire({
            title: '¿Eliminar proveedor?',
            text: `Se borrará a "${datosApp.proveedores[index].nombre}".`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Borrar',
            background: '#1a1a1e', color: '#fff'
        }).then((result) => {
            if (result.isConfirmed) {
                datosApp.proveedores.splice(index, 1);
                guardar(); actualizarPantalla();
            }
        });
    }

    // --- RENDERIZADO GENERAL ---
    function actualizarPantalla() {
        document.getElementById('cierre-total').innerText = `$${datosApp.cierreDiario.toLocaleString()}`;
        
        // Render Clientes
        const listaC = document.getElementById('lista-fiados');
        listaC.innerHTML = datosApp.clientes.length === 0 ? `<div style="text-align:center; color:var(--text-muted); font-size:14px; padding:10px;">Sin clientes registrados.</div>` : '';
        datosApp.clientes.forEach((c, index) => {
            listaC.innerHTML += `
                <div class="item-row">
                    <div class="info-col">
                        <div class="name-row">
                            <span class="item-name">${c.nombre}</span>
                            ${c.cambiosNombre < 2 ? `<span class="edit-badge" onclick="editarNombre(${index})">📝 (${2 - c.cambiosNombre})</span>` : ''}
                        </div>
                    </div>
                    <div class="actions-row">
                        <div class="item-monto monto-deuda" style="margin-right:10px;">$${c.saldo.toLocaleString()}</div>
                        <button class="btn-action btn-add-more" onclick="modificarSaldo(${index}, 'fiar')">+ Fiar</button>
                        <button class="btn-action btn-pay" onclick="modificarSaldo(${index}, 'pagar')">✔</button>
                        <button class="btn-action btn-del" onclick="eliminarCliente(${index})">🗑️</button>
                    </div>
                </div>
            `;
        });

        // Render Proveedores
        const listaP = document.getElementById('lista-proveedores');
        listaP.innerHTML = datosApp.proveedores.length === 0 ? `<div style="text-align:center; color:var(--text-muted); font-size:14px; padding:10px;">Sin proveedores registrados.</div>` : '';
        datosApp.proveedores.forEach((p, index) => {
            listaP.innerHTML += `
                <div class="item-row">
                    <div class="info-col">
                        <span class="item-name" onclick="modificarSaldoProveedor(${index})" style="cursor:pointer; text-decoration:underline;">${p.nombre} 📝</span>
                        <span style="font-size:12px; color:var(--text-muted);">Estado: $${p.saldoPendiente.toLocaleString()}</span>
                    </div>
                    <div class="actions-row">
                        <button class="btn-action btn-alert-prov" onclick="crearRecordatorioId(${index})">🔔 Crear Recordatorio</button>
                        <button class="btn-action btn-del" onclick="eliminarProveedor(${index})">🗑️</button>
                    </div>
                </div>
            `;
        });
    }

    // Inicialización
    if(!datosApp.recordatorios) datosApp.recordatorios = [];
    renderRecordatorios();
    actualizarPantalla();
</script>
</body>
</html>
