<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreta Digital Inteligente - Marcos Fuentes</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121214;
            --bg-surface: #1a1a1e;
            --bg-card: #26262b;
            --text-main: #ffffff;
            --text-muted: #a0a0aa;
            --accent: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 15px; padding: 15px; background: var(--bg-surface); border-radius: 16px; border: 1px solid #333; }
        header h1 { font-size: 22px; font-weight: 700; color: var(--text-main); }
        header p { font-size: 13px; color: var(--text-muted); }

        .backup-section { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .btn-backup { padding: 10px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; flex: 1; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .btn-backup.export { background: rgba(16, 185, 129, 0.15); border: 1px solid var(--success); color: var(--success); }
        .btn-backup.import { background: rgba(37, 99, 235, 0.15); border: 1px solid var(--accent); color: var(--accent); }

        /* Contenedor de Alertas */
        .alert-box { background: rgba(245, 158, 11, 0.15); border: 1px solid var(--warning); border-radius: 14px; padding: 15px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .alert-title { font-size: 14px; font-weight: 600; color: var(--warning); }
        .alert-text { font-size: 18px; font-weight: 700; color: #fff; }
        .alert-btn { background: var(--warning); color: #000; border: none; padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; align-self: flex-start; }

        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
        .sub-resumen { font-size: 12px; font-weight: 400; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 20px; }
        
        .card { background: var(--bg-surface); border-radius: 16px; padding: 20px; border: 1px solid #2d2d34; margin-bottom: 25px; }
        
        /* Buscador / Lupa y Filtros Estilo Minimalista */
        .search-container { position: relative; margin-bottom: 15px; }
        .search-input { width: 100%; background: var(--bg-card); border: 1px solid #3a3a44; border-radius: 10px; padding: 10px 12px 10px 38px; color: #fff; font-size: 14px; outline: none; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
        
        .filter-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .filter-btn { background: var(--bg-card); border: 1px solid #3a3a44; color: var(--text-muted); padding: 6px 14px; font-size: 12px; font-weight: 500; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Caja Grande */
        .cierre-display-grande { background: var(--bg-card); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px; border: 1px solid #3a3a44; }
        .cierre-display-grande .titulo-central { font-size: 15px; color: var(--text-muted); font-weight: 500; margin-bottom: 5px; }
        .cierre-display-grande .monto-central { font-size: 36px; font-weight: 700; color: var(--success); margin-bottom: 15px; }
        
        .desglose-metodos { display: flex; justify-content: space-around; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .metodo-item { font-size: 13px; display: flex; flex-direction: column; gap: 2px; }
        .metodo-item span:first-child { color: var(--text-muted); font-size: 11px; }
        .metodo-item .val-efec { color: #fff; font-weight: 600; }
        .metodo-item .val-nequi { color: #818cf8; font-weight: 600; }

        .btn-close-day { width: 100%; background: rgba(245, 158, 11, 0.12); border: 1px dashed var(--warning); color: var(--warning); padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-close-day:hover { background: rgba(245, 158, 11, 0.2); }

        .cierre-input { width: 100%; background: var(--bg-card); border: 1px solid #3a3a44; border-radius: 8px; padding: 12px; color: #fff; font-size: 15px; margin-bottom: 12px; outline: none; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-quick { border: none; padding: 12px; font-size: 13px; font-weight: 600; border-radius: 10px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-quick.in-efec { background: #15803d; }
        .btn-quick.in-neq { background: #4338ca; }
        .btn-quick.out-efec { background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger); color: var(--danger); }
        .btn-quick.out-neq { background: rgba(168, 85, 247, 0.15); border: 1px solid #a855f7; color: #c084fc; }

        .fiados-list, .proveedores-list, .history-box-list { display: flex; flex-direction: column; gap: 12px; }
        .item-row { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid #3a3a44; display: flex; justify-content: space-between; align-items: center; }
        
        .info-col { display: flex; flex-direction: column; gap: 2px; flex: 1; }
        .name-row { display: flex; align-items: center; gap: 8px; }
        .item-name { font-weight: 600; font-size: 15px; cursor: pointer; text-decoration: underline; color: #fff; transition: color 0.2s; }
        .item-name:hover { color: var(--accent); }
        .item-subtext { font-size: 11px; color: var(--text-muted); }
        .edit-badge { font-size: 10px; background: #444; color: #ccc; padding: 2px 6px; border-radius: 20px; cursor: pointer; }
        
        .item-monto { font-size: 18px; font-weight: 700; }
        .monto-deuda { color: var(--danger); }
        
        .actions-row { display: flex; gap: 6px; align-items: center; }
        .btn-action { border: none; padding: 8px 10px; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; }
        .btn-pay { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .btn-add-more { background: rgba(37, 99, 235, 0.15); color: var(--accent); }
        .btn-del { background: rgba(239, 68, 116, 0.15); color: var(--danger); font-size: 14px; }
        
        /* Botón Ver Más */
        .btn-ver-mas { width: 100%; margin-top: 10px; background: rgba(255,255,255,0.04); border: 1px dashed #444; padding: 10px; border-radius: 10px; color: var(--text-muted); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: background 0.2s; }
        .btn-ver-mas:hover { background: rgba(255,255,255,0.08); color: #fff; }

        .historial-tabla { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; color: #fff; }
        .historial-tabla th, .historial-tabla td { padding: 8px; text-align: left; border-bottom: 1px solid #3a3a44; }
        .historial-tabla th { color: var(--text-muted); font-weight: 500; }
        .txt-fiado { color: var(--danger); font-weight: 600; }
        .txt-abono { color: var(--success); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Libreta Digital de Ventas</h1>
        <p>Marcos Fuentes • Gestión de Negocio</p>
    </header>

    <div class="backup-section">
        <button class="btn-backup export" onclick="exportarDatos()">💾 Descargar Copia</button>
        <button class="btn-backup import" onclick="importarDatos()">📂 Restaurar Copia</button>
    </div>

    <!-- Alertas Dinámicas Filtradas -->
    <div id="contenedor-recordatorios"></div>

    <div class="section-title">📊 Cierre de Caja Diario</div>
    <div class="card">
        <div class="cierre-display-grande">
            <div class="titulo-central">Total Acumulado Hoy</div>
            <div class="monto-central" id="caja-total">$0</div>
            
            <div class="desglose-metodos">
                <div class="metodo-item">
                    <span>💵 En Efectivo</span>
                    <span class="val-efec" id="caja-efectivo">$0</span>
                </div>
                <div class="metodo-item">
                    <span>📱 En Nequi</span>
                    <span class="val-nequi" id="caja-nequi">$0</span>
                </div>
            </div>

            <button class="btn-close-day" onclick="ejecutarCierreDeCaja()">🔒 Cerrar Caja de Hoy y Reiniciar</button>
        </div>
        
        <input type="number" id="cierre-monto-input" class="cierre-input" placeholder="0">
        
        <div class="btn-grid">
            <button class="btn-quick in-efec" onclick="registrarMovimiento('ingreso', 'efectivo')">➕ Venta Efectivo</button>
            <button class="btn-quick in-neq" onclick="registrarMovimiento('ingreso', 'nequi')">➕ Venta Nequi</button>
            <button class="btn-quick out-efec" onclick="registrarMovimiento('egreso', 'efectivo')">➖ Gasto Efectivo</button>
            <button class="btn-quick out-neq" onclick="registrarMovimiento('egreso', 'nequi')">➖ Gasto Nequi</button>
        </div>
    </div>

    <!-- CONTROL DE FIADOS CON BUSCADOR Y FILTROS -->
    <div class="section-title">
        <span>👥 Personas que Deben <span id="resumen-fiados" class="sub-resumen">$0</span></span>
        <button onclick="nuevoCliente()" style="background:none; border:none; color:var(--accent); font-weight:600; cursor:pointer; font-size:14px;">+ Nuevo Cliente</button>
    </div>
    <div class="card">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="busqueda-cliente" class="search-input" placeholder="Buscar cliente por nombre..." oninput="filtrarYRenderizarClientes()">
        </div>

        <div class="filter-tabs">
            <button id="filtro-todos" class="filter-btn active" onclick="cambiarFiltroClientes('todos')">Todos</button>
            <button id="filtro-deudores" class="filter-btn" onclick="cambiarFiltroClientes('deudores')">Solo Deudores</button>
        </div>
        
        <div class="fiados-list" id="lista-fiados"></div>
        <div id="contenedor-ver-mas"></div>
    </div>

    <!-- HISTORIAL DE CIERRES ANTERIORES -->
    <div class="section-title">📅 Historial de Cierres Diarios</div>
    <div class="card">
        <div class="history-box-list" id="lista-cierres-historicos"></div>
    </div>

    <div class="section-title">
        <span>🚚 Estado de Proveedores</span>
        <button onclick="nuevoProveedorFlujoRapido()" style="background:none; border:none; color:var(--warning); font-weight:600; cursor:pointer; font-size:14px;">+ Nuevo Proveedor</button>
    </div>
    <div class="card">
        <div class="proveedores-list" id="lista-proveedores"></div>
    </div>
</div>

<script>
    let datosApp = {
        cierreEfectivo: 0,
        cierreNequi: 0,
        clientes: [],
        proveedores: [],
        recordatorios: [],
        historialCierres: [] // Estructura nueva para registrar días cerrados
    };

    // Variables de estado internas
    let mostrarTodosLosClientes = false;
    let filtroClienteActual = 'todos'; // 'todos' o 'deudores'

    if (localStorage.getItem('libreta_inteligente_v6')) {
        datosApp = JSON.parse(localStorage.getItem('libreta_inteligente_v6'));
    } else if (localStorage.getItem('libreta_inteligente_v5')) {
        // Migración automática limpia desde la versión anterior sin pérdida
        const viejaData = JSON.parse(localStorage.getItem('libreta_inteligente_v5'));
        datosApp = { ...datosApp, ...viejaData };
    }

    function guardar() {
        localStorage.setItem('libreta_inteligente_v6', JSON.stringify(datosApp));
    }

    function obtenerFechaHoraActual() {
        const d = new Date();
        const fecha = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
        let minutos = d.getMinutes();
        if (minutos < 10) minutos = '0' + minutes;
        const hora = `${d.getHours()}:${minutos}`;
        return { fecha, completa: `${fecha} a las ${hora}` };
    }

    function exportarDatos() {
        const dataStr = JSON.stringify(datosApp);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `Copia_Libreta.json`; a.click();
    }

    function importarDatos() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                datosApp = JSON.parse(event.target.result);
                guardar(); actualizarPantalla(); renderRecordatorios();
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function registrarMovimiento(tipo, metodo) {
        const montoInput = document.getElementById('cierre-monto-input');
        const monto = parseFloat(montoInput.value);
        if (isNaN(monto) || monto <= 0) return;
        datosApp[metodo === 'efectivo' ? 'cierreEfectivo' : 'cierreNequi'] += (monto * (tipo === 'ingreso' ? 1 : -1));
        montoInput.value = ''; guardar(); actualizarPantalla();
    }

    // --- FUNCIÓN HISTORIAL: CERRAR DÍA ---
    function ejecutarCierreDeCaja() {
        const totalHoy = datosApp.cierreEfectivo + datosApp.cierreNequi;
        if(totalHoy === 0) {
            Swal.fire({ title: 'Caja Vacía', text: 'No hay movimientos registrados hoy para cerrar.', icon: 'info', background: '#1a1a1e', color: '#fff' });
            return;
        }

        const tiempo = obtenerFechaHoraActual();

        Swal.fire({
            title: '¿Cerrar caja del día?',
            text: `Se registrará un total de $${totalHoy.toLocaleString()} y la caja de mañana iniciará en $0.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Sí, cerrar día',
            background: '#1a1a1e', color: '#fff'
        }).then((result) => {
            if (result.isConfirmed) {
                if(!datosApp.historialCierres) datosApp.historialCierres = [];
                
                // Guardar en el histórico
                datosApp.historialCierres.unshift({
                    fecha: tiempo.fecha,
                    efectivo: datosApp.cierreEfectivo,
                    nequi: datosApp.cierreNequi,
                    total: totalHoy
                });

                // Reiniciar caja a cero
                datosApp.cierreEfectivo = 0;
                datosApp.cierreNequi = 0;
                
                guardar();
                actualizarPantalla();
                Swal.fire({ title: '¡Caja Cerrada!', text: 'Los datos se archivaron con éxito.', icon: 'success', background: '#1a1a1e', color: '#fff' });
            }
        });
    }

    function eliminarCierreHistorico(index) {
        Swal.fire({ title: '¿Borrar este registro?', icon: 'warning', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((result) => {
            if (result.isConfirmed) { 
                datosApp.historialCierres.splice(index, 1); 
                guardar(); 
                actualizarPantalla(); 
            }
        });
    }

    function renderRecordatorios() {
        const contenedor = document.getElementById('contenedor-recordatorios');
        contenedor.innerHTML = '';
        if(!datosApp.recordatorios) datosApp.recordatorios = [];
        const hoy = new Date(); hoy.setHours(0,0,0,0);

        datosApp.recordatorios.forEach((rec, index) => {
            let mostrarAlerta = true;
            if(rec.fechaRaw) {
                const fechaLimite = new Date(rec.fechaRaw + 'T00:00:00');
                const diferenciaDias = Math.ceil((fechaLimite - hoy) / (1000 * 60 * 60 * 24));
                if(diferenciaDias > 2) mostrarAlerta = false;
            }
            if(mostrarAlerta) {
                contenedor.innerHTML += `
                    <div class="alert-box">
                        <div class="alert-title">🔔 PROVEEDOR PRÓXIMO: ${rec.proveedor.toUpperCase()}</div>
                        <div class="alert-text">
                            Entrega/Pago el <span style="color:var(--warning);">${rec.dia}</span>. 
                            <span style="display:block; font-size:22px; color:#fff; margin-top:5px;">Valor: $${rec.valor.toLocaleString()}</span>
                        </div>
                        <button class="alert-btn" onclick="eliminarRecordatorio(${index})">✔ Confirmar y Quitar Aviso</button>
                    </div>
                `;
            }
        });
    }

    function eliminarRecordatorio(index) {
        datosApp.recordatorios.splice(index, 1);
        guardar(); renderRecordatorios();
    }

    function nuevoProveedorFlujoRapido() {
        Swal.fire({
            title: 'Nuevo Proveedor',
            background: '#1a1a1e', color: '#fff',
            html: `
                <input id="prov-nombre" class="swal2-input" placeholder="Nombre" style="margin-bottom:12px; background:#26262b; color:#fff;">
                <input id="prov-monto" type="number" class="swal2-input" placeholder="Monto ($)" style="margin-bottom:12px; background:#26262b; color:#fff;">
                <input id="prov-fecha" type="date" class="swal2-input" style="background:#26262b; color:#fff;">
            `,
            showCancelButton: true,
            confirmButtonText: 'Guardar',
            preConfirm: () => {
                const nombre = document.getElementById('prov-nombre').value.trim();
                const monto = parseFloat(document.getElementById('prov-monto').value) || 0;
                const fecha = document.getElementById('prov-fecha').value;
                if(!nombre) return false;
                return { nombre, monto, fecha };
            }
        }).then((res) => {
            if (res.isConfirmed) {
                const p = res.value;
                datosApp.proveedores.push({ nombre: p.nombre, saldoPendiente: p.monto, fechaEntrega: p.fecha });
                if(p.monto > 0 && p.fecha) {
                    const partes = p.fecha.split('-');
                    const fFormateada = `${partes[2]}/${partes[1]}/${partes[0]}`;
                    datosApp.recordatorios.push({ proveedor: p.nombre, dia: fFormateada, valor: p.monto, fechaRaw: p.fecha });
                }
                guardar(); actualizarPantalla(); renderRecordatorios();
            }
        });
    }

    function verHistorialCliente(index) {
        const c = datosApp.clientes[index];
        let filasHtml = '';
        if(!c.historial || c.historial.length === 0) {
            filasHtml = `<tr><td colspan="3" style="text-align:center; color:var(--text-muted);">No hay movimientos registrados.</td></tr>`;
        } else {
            c.historial.forEach(h => {
                const claseMonto = h.tipo === 'fiado' ? 'txt-fiado' : 'txt-abono';
                filasHtml += `
                    <tr>
                        <td>${h.fechaHora}</td>
                        <td>${h.tipo.toUpperCase()}</td>
                        <td class="${claseMonto}">${h.tipo === 'fiado' ? '+' : '-'} $${h.monto.toLocaleString()}</td>
                    </tr>
                `;
            });
        }
        Swal.fire({
            title: `Historial de ${c.nombre}`,
            background: '#1a1a1e', color: '#fff',
            html: `<div style="max-height: 250px; overflow-y: auto;"><table class="historial-tabla"><thead><tr><th>Fecha y Hora</th><th>Tipo</th><th>Monto</th></tr></thead><tbody>${filasHtml}</tbody></table></div>`,
            confirmButtonText: 'Cerrar'
        });
    }

    function nuevoCliente() {
        Swal.fire({
            title: 'Agregar Fiador',
            background: '#1a1a1e', color: '#fff',
            html: `
                <input id="cli-nombre" class="swal2-input" placeholder="Nombre" style="margin-bottom:12px; background:#26262b; color:#fff;">
                <input id="cli-inicial" type="number" class="swal2-input" placeholder="Monto inicial ($ opcional)" style="background:#26262b; color:#fff;">
            `,
            showCancelButton: true,
            confirmButtonText: 'Registrar',
            preConfirm: () => {
                const nombre = document.getElementById('cli-nombre').value.trim();
                const inicial = parseFloat(document.getElementById('cli-inicial').value) || 0;
                if(!nombre) return false;
                return { nombre, saldo: inicial };
            }
        }).then((res) => {
            if (res.isConfirmed) {
                const tiempo = obtenerFechaHoraActual();
                const nuevoH = res.value.saldo > 0 ? [{ tipo: 'fiado', monto: res.value.saldo, fechaHora: tiempo.completa }] : [];
                datosApp.clientes.push({ nombre: res.value.nombre, saldo: res.value.saldo, fechaUltimo: tiempo.fecha, historial: nuevoH, cambiosNombre: 0 });
                guardar(); actualizarPantalla();
            }
        });
    }

    function modificarSaldo(index, accion) {
        const c = datosApp.clientes[index];
        Swal.fire({ title: accion === 'fiar' ? `Fiar a ${c.nombre}` : `Abonar de ${c.nombre}`, input: 'number', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((res) => {
            const valor = parseFloat(res.value);
            if (res.isConfirmed && valor > 0) {
                c.saldo += (accion === 'fiar' ? valor : -valor);
                if (c.saldo < 0) c.saldo = 0;
                const tiempo = obtenerFechaHoraActual();
                c.fechaUltimo = tiempo.fecha;
                if(!c.historial) c.historial = [];
                c.historial.push({ tipo: accion === 'fiar' ? 'fiado' : 'abono', monto: valor, fechaHora: tiempo.completa });
                guardar(); actualizarPantalla();
            }
        });
    }

    function editarNombre(index) {
        let c = datosApp.clientes[index];
        if (c.cambiosNombre >= 2) return;
        Swal.fire({ title: 'Editar Nombre', input: 'text', inputValue: c.nombre, showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((res) => {
            if (res.isConfirmed && res.value) {
                c.nombre = res.value; c.cambiosNombre += 1;
                guardar(); actualizarPantalla();
            }
        });
    }

    function eliminarCliente(index) {
        Swal.fire({ title: '¿Eliminar cuenta?', text: 'Se borrará permanentemente.', icon: 'warning', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((result) => {
            if (result.isConfirmed) { datosApp.clientes.splice(index, 1); guardar(); actualizarPantalla(); }
        });
    }

    function eliminarProveedor(index) {
        Swal.fire({ title: '¿Eliminar proveedor?', icon: 'warning', showCancelButton: true, background: '#1a1a1e', color: '#fff' }).then((result) => {
            if (result.isConfirmed) { datosApp.proveedores.splice(index, 1); guardar(); actualizarPantalla(); }
        });
    }

    // --- FUNCIÓN FILTROS: CAMBIAR TABS ---
    function cambiarFiltroClientes(tipo) {
        filtroClienteActual = tipo;
        document.getElementById('filtro-todos').classList.toggle('active', tipo === 'todos');
        document.getElementById('filtro-deudores').classList.toggle('active', tipo === 'deudores');
        filtrarYRenderizarClientes();
    }

    // --- FILTRADO INTELIGENTE Y RENDER DE CLIENTES CON ESTADO "AL DÍA" ---
    function filtrarYRenderizarClientes() {
        const query = document.getElementById('busqueda-cliente').value.toLowerCase().trim();
        const listaC = document.getElementById('lista-fiados');
        const contenedorVerMas = document.getElementById('contenedor-ver-mas');
        
        listaC.innerHTML = '';
        contenedorVerMas.innerHTML = '';

        // Mapear con su índice original para no perder las referencias al modificar datos
        let clientesFiltrados = datosApp.clientes.map((c, originalIndex) => ({ ...c, originalIndex }));
        
        // 1. Filtrar por Lupa de Búsqueda
        if (query !== '') {
            clientesFiltrados = clientesFiltrados.filter(c => c.nombre.toLowerCase().includes(query));
        }

        // 2. Filtrar por Tab Rápido (Solo Deudores)
        if (filtroClienteActual === 'deudores') {
            clientesFiltrados = clientesFiltrados.filter(c => c.saldo > 0);
        }

        const totalEncontrados = clientesFiltrados.length;
        
        if (totalEncontrados === 0) {
            listaC.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:10px;">Ningún cliente coincide.</div>`;
            return;
        }

        // Aplicar límite de 5 si no hay búsqueda activa y no se ha marcado expandir todo
        let limite = (mostrarTodosLosClientes || query !== '') ? totalEncontrados : 5;
        let mostrados = clientesFiltrados.slice(0, limite);

        mostrados.forEach((c) => {
            // Estilo dinámico si está "Al día" o tiene deuda
            let visualizacionSaldo = '';
            if (c.saldo === 0) {
                visualizacionSaldo = `<div class="item-monto" style="color: var(--success); margin-right:8px; font-size:15px; font-weight:600;">Al día</div>`;
            } else {
                visualizacionSaldo = `<div class="item-monto monto-deuda" style="margin-right:8px;">$${c.saldo.toLocaleString()}</div>`;
            }

            listaC.innerHTML += `
                <div class="item-row">
                    <div class="info-col">
                        <div class="name-row">
                            <span class="item-name" onclick="verHistorialCliente(${c.originalIndex})">${c.nombre}</span>
                            ${c.cambiosNombre < 2 ? `<span class="edit-badge" onclick="editedName(${c.originalIndex})">📝</span>` : ''}
                        </div>
                        <span class="item-subtext">Último movimiento: ${c.fechaUltimo}</span>
                    </div>
                    <div class="actions-row">
                        ${visualizacionSaldo}
                        <button class="btn-action btn-add-more" onclick="modificarSaldo(${c.originalIndex}, 'fiar')">+ Fiar</button>
                        <button class="btn-action btn-pay" onclick="modificarSaldo(${c.originalIndex}, 'pagar')" ${c.saldo === 0 ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : ''}>✔</button>
                        <button class="btn-action btn-del" onclick="eliminarCliente(${c.originalIndex})">🗑️</button>
                    </div>
                </div>
            `;
        });

        // Control del botón Expandir / Contraer lista (solo si no hay búsqueda activa)
        if (totalEncontrados > 5 && !mostrarTodosLosClientes && query === '') {
            contenedorVerMas.innerHTML = `
                <button class="btn-ver-mas" onclick="conmutarVerTodos()">👁️ Ver todos los clientes (${totalEncontrados})</button>
            `;
        } else if (mostrarTodosLosClientes && query === '' && totalEncontrados > 5) {
            contenedorVerMas.innerHTML = `
                <button class="btn-ver-mas" onclick="conmutarVerTodos()">🔼 Mostrar menos (Ver solo 5)</button>
            `;
        }
    }

    function conmutarVerTodos() {
        mostrarTodosLosClientes = !mostrarTodosLosClientes;
        filtrarYRenderizarClientes();
    }

    function editedName(idx) { editarNombre(idx); }

    function actualizarPantalla() {
        // Totales de Caja Principal
        const totalGen = datosApp.cierreEfectivo + datosApp.cierreNequi;
        document.getElementById('caja-efectivo').innerText = `$${datosApp.cierreEfectivo.toLocaleString()}`;
        document.getElementById('caja-nequi').innerText = `$${datosApp.cierreNequi.toLocaleString()}`;
        document.getElementById('caja-total').innerText = `$${totalGen.toLocaleString()}`;
        
        // Resumen de Deudores Arriba
        let totalFiadoAcumulado = 0; let cantPersonasDeben = 0;
        datosApp.clientes.forEach(c => { if(c.saldo > 0) { totalFiadoAcumulado += c.saldo; cantPersonasDeben++; } });
        document.getElementById('resumen-fiados').innerText = `${cantPersonasDeben} deben total: $${totalFiadoAcumulado.toLocaleString()}`;

        // Renderizar sección clientes
        filtrarYRenderizarClientes();

        // Renderizar Historial de Cierres Diarios
        const listaCierres = document.getElementById('lista-cierres-historicos');
        if(!datosApp.historialCierres) datosApp.historialCierres = [];
        
        listaCierres.innerHTML = datosApp.historialCierres.length === 0 ? 
            `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:5px;">No hay cierres archivados.</div>` : '';
        
        datosApp.historialCierres.forEach((h, index) => {
            listaCierres.innerHTML += `
                <div class="item-row" style="padding:10px 15px; background: rgba(255,255,255,0.02);">
                    <div class="info-col">
                        <span style="font-weight:600; font-size:14px; color:#fff;">📅 Día: ${h.fecha}</span>
                        <span style="font-size:11px; color:var(--text-muted);">💵 Efec: $${h.efectivo.toLocaleString()} | 📱 Nequi: $${h.nequi.toLocaleString()}</span>
                    </div>
                    <div class="actions-row">
                        <span style="font-size:15px; font-weight:700; color:var(--success); margin-right:10px;">$${h.total.toLocaleString()}</span>
                        <button class="btn-action btn-del" style="padding:4px 8px; font-size:11px;" onclick="eliminarCierreHistorico(${index})">🗑️</button>
                    </div>
                </div>
            `;
        });

        // Proveedores
        const listaP = document.getElementById('lista-proveedores');
        listaP.innerHTML = datosApp.proveedores.length === 0 ? `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:5px;">Sin proveedores registrados.</div>` : '';
        datosApp.proveedores.forEach((p, index) => {
            let fechaMostrar = 'Sin fecha';
            if(p.fechaEntrega && p.fechaEntrega.includes('-')) {
                const partes = p.fechaEntrega.split('-');
                fechaMostrar = `${partes[2]}/${partes[1]}/${partes[0]}`;
            }
            listaP.innerHTML += `
                <div class="item-row">
                    <div class="info-col">
                        <span class="item-name" style="text-decoration:none; cursor:default;">${p.nombre}</span>
                        <span style="font-size:12px; color:var(--text-muted);">Deuda: $${p.saldoPendiente.toLocaleString()} • Entrega: ${fechaMostrar}</span>
                    </div>
                    <div class="actions-row">
                        <button class="btn-action btn-del" onclick="eliminarProveedor(${index})">🗑️</button>
                    </div>
                </div>
            `;
        });
    }

    // Encendido Inicial
    renderRecordatorios();
    actualizarPantalla();
</script>
</body>
</html>
